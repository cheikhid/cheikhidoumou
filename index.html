<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Anti-FOUC : applique le thème AVANT le rendu React (défaut sombre) -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme');
                if (t !== 'light' && t !== 'dark') t = 'dark';
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <title>Cheikh Idoumou | Développeur Backend — Python, Django, Spring Boot & .NET</title>
    <meta name="description"
        content="Portfolio de Cheikh Idoumou, ingénieur logiciel backend (Python, Django, Spring Boot, .NET, DevOps) basé à Nouakchott, Mauritanie." />
    <meta name="theme-color" content="#0a0e27" />
    <meta name="color-scheme" content="dark light" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://cheikhidoumou.dev/" />
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
